<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown — 25 sept. 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #111;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #eee;
            gap: 40px;
        }

        .subtitle {
            font-size: 1.4rem;
            font-weight: 600;
            color: #ccc;
            letter-spacing: 0.02em;
            margin-bottom: -20px;
        }

        h1 {
            font-size: 0.9rem;
            font-weight: 400;
            color: #555;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .timer {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .bloc {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .valeur {
            font-size: 5rem;
            font-weight: 700;
            width: 150px;
            text-align: center;
            background: #1c1c1c;
            border-radius: 14px;
            padding: 22px 0;
            color: #fff;
            letter-spacing: -2px;
        }

        .label {
            font-size: 0.65rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .sep {
            font-size: 4rem;
            font-weight: 200;
            color: #2a2a2a;
            margin-bottom: 30px;
            line-height: 1;
        }

        .ecoule {
            font-size: 2rem;
            color: #fff;
        }
    </style>
</head>
<body>
    <p class="subtitle">Temps avant la fin des études pour les Mastère 2 de la promotion 2024-2026 d'Hesias</p>
    <h1>Vendredi 25 septembre 2026 &mdash; 17h00</h1>
    <div class="timer" id="timer"></div>
    <script src="script.js"></script>
</body>
</html>
